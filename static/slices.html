<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuroLens — volume cut</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <link rel="stylesheet" href="/static/css/slices.css" />
</head>
<body>
  <header>
    <span><strong>Volume cut</strong> — brain GLB + moving clip + slice PNG at the plane</span>
    <nav><a href="/">Home</a></nav>
    <div class="controls">
      <div>
        <label for="plane">Cut along</label>
        <select id="plane" aria-label="Cut axis"></select>
      </div>
      <div class="slider-row" id="cardinalIndexRow">
        <label for="index">Slice</label>
        <input type="range" id="index" min="0" max="0" value="0" />
        <span id="indexLabel">0</span>
      </div>
      <button type="button" id="prev" title="Previous slice">←</button>
      <button type="button" id="next" title="Next slice">→</button>
    </div>
    <div class="controls oblique-controls" id="obliqueControls" hidden>
      <div class="slider-row">
        <label for="yaw">Yaw °</label>
        <input type="range" id="yaw" min="-180" max="180" step="1" value="0" />
        <span id="yawLabel">0</span>
      </div>
      <div class="slider-row">
        <label for="pitch">Pitch °</label>
        <input type="range" id="pitch" min="-90" max="90" step="1" value="0" />
        <span id="pitchLabel">0</span>
      </div>
      <div class="slider-row">
        <label for="obliqueOffset">Offset mm</label>
        <input
          type="range"
          id="obliqueOffset"
          min="-100"
          max="100"
          step="0.5"
          value="0"
        />
        <span id="obliqueOffsetLabel">0</span>
      </div>
      <button type="button" id="resetOblique" title="Reset oblique to axial">Reset</button>
    </div>
    <span id="status">Loading manifest…</span>
  </header>
  <main class="viewer-split">
    <section class="panel wide" aria-label="3D cut">
      <h2>3D — orbit to see the cut</h2>
      <div id="three-host"></div>
    </section>
    <section class="panel" aria-label="2D slice">
      <h2>2D — same slice</h2>
      <div class="slice-wrap">
        <img id="slice" alt="MRI slice" hidden />
      </div>
    </section>
  </main>
  <script type="module" src="/static/js/slices_viewer.js"></script>
</body>
</html>
